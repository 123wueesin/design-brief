<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設計日報 — Design Brief</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@400;500&family=Noto+Serif+TC:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #1a1814;
      --ink-muted: #6b6660;
      --ink-faint: #b0ada8;
      --paper: #f7f4ef;
      --paper-warm: #ede9e2;
      --rule: #d4cfc8;
      --accent-design: #1a4a7a;
      --accent-fashion: #7a1a3a;
      --accent-design-light: #e8f0f8;
      --accent-fashion-light: #f8e8ee;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    /* MASTHEAD */
    .masthead {
      border-bottom: 3px solid var(--ink);
      padding: 2rem 2.5rem 1.25rem;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: end;
      gap: 1rem;
    }

    .masthead-meta {
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .masthead-title {
      text-align: center;
    }

    .masthead-title h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
    }

    .masthead-title .sub {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-muted);
      margin-top: 6px;
      font-family: 'IBM Plex Mono', monospace;
    }

    .masthead-right {
      text-align: right;
      font-size: 11px;
      color: var(--ink-muted);
      letter-spacing: 0.05em;
    }

    .masthead-date {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--ink);
      font-style: italic;
    }

    /* SECTION STRIP */
    .section-strip {
      border-bottom: 1px solid var(--rule);
      display: flex;
      padding: 0 2.5rem;
    }

    .section-tab {
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 0.6rem 1.2rem 0.6rem 0;
      margin-right: 1.5rem;
      border-bottom: 2px solid transparent;
      color: var(--ink-muted);
      cursor: default;
    }

    .section-tab.design { border-color: var(--accent-design); color: var(--accent-design); }
    .section-tab.fashion { border-color: var(--accent-fashion); color: var(--accent-fashion); }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 0;
      padding: 0 2.5rem;
    }

    /* ARTICLE CARD */
    .article {
      padding: 1.75rem 1.5rem 1.75rem 0;
      border-right: 1px solid var(--rule);
      border-bottom: 1px solid var(--rule);
    }

    .article:last-child,
    .article.no-border-right { border-right: none; }

    .article.col-8 { grid-column: span 8; }
    .article.col-4 { grid-column: span 4; }
    .article.col-6 { grid-column: span 6; }
    .article.col-12 { grid-column: span 12; border-right: none; }

    @media (max-width: 700px) {
      .article { grid-column: span 12 !important; border-right: none; padding-right: 0; }
      .masthead { grid-template-columns: 1fr; text-align: center; }
      .masthead-right { text-align: center; }
      .grid { padding: 0 1.25rem; }
      .masthead { padding: 1.5rem 1.25rem 1rem; }
    }

    .cat-tag {
      display: inline-block;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 2px 8px;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .cat-tag.design {
      background: var(--accent-design-light);
      color: var(--accent-design);
    }

    .cat-tag.fashion {
      background: var(--accent-fashion-light);
      color: var(--accent-fashion);
    }

    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 2.5vw, 1.45rem);
      line-height: 1.3;
      font-weight: 600;
      margin-bottom: 10px;
      color: var(--ink);
    }

    .article-source {
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .field-label {
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 5px;
      margin-top: 14px;
    }

    .field-body {
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--ink);
    }

    .pov-body {
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--ink-muted);
      font-style: italic;
      padding-left: 10px;
      border-left: 2px solid var(--rule);
      margin-top: 14px;
    }

    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--rule);
    }

    .kw {
      font-size: 10px;
      padding: 2px 8px;
      border: 1px solid var(--rule);
      color: var(--ink-muted);
      letter-spacing: 0.04em;
    }

    .article-link {
      display: inline-block;
      margin-top: 10px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-muted);
      text-decoration: none;
      border-bottom: 1px solid var(--rule);
      padding-bottom: 1px;
    }

    .article-link:hover { color: var(--ink); border-color: var(--ink); }

    /* FOOTER */
    footer {
      border-top: 3px solid var(--ink);
      padding: 1.5rem 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
    }

    footer .f-left {
      font-size: 11px;
      color: var(--ink-muted);
    }

    footer .f-right {
      font-size: 10px;
      color: var(--ink-faint);
      letter-spacing: 0.06em;
    }

    /* LOADING STATE */
    .loading-state {
      grid-column: span 12;
      text-align: center;
      padding: 5rem 2rem;
      color: var(--ink-muted);
    }

    .loading-state .loading-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-style: italic;
      margin-bottom: 1rem;
    }

    .spinner-line {
      width: 60px;
      height: 1px;
      background: var(--rule);
      margin: 1.5rem auto;
      position: relative;
      overflow: hidden;
    }

    .spinner-line::after {
      content: '';
      position: absolute;
      left: -100%;
      top: 0;
      width: 100%;
      height: 100%;
      background: var(--ink);
      animation: slide 1.2s ease-in-out infinite;
    }

    @keyframes slide {
      0% { left: -100%; }
      100% { left: 100%; }
    }

    /* EMPTY STATE */
    .empty-notice {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: var(--ink-muted);
      text-align: center;
      padding: 4rem 2rem;
      grid-column: span 12;
    }

    .generate-btn {
      display: block;
      margin: 1.5rem auto 0;
      padding: 10px 24px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
    }

    .generate-btn:hover { opacity: 0.8; }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<header class="masthead">
  <div class="masthead-meta">
    Vol. 1 &nbsp;·&nbsp; 設計與時尚
  </div>
  <div class="masthead-title">
    <h1>設計日報</h1>
    <div class="sub">Design &amp; Fashion Brief — Daily Edition</div>
  </div>
  <div class="masthead-right">
    <div class="masthead-date" id="display-date"></div>
    <div style="margin-top:4px;" id="last-updated"></div>
  </div>
</header>

<div class="section-strip">
  <div class="section-tab design">設計</div>
  <div class="section-tab fashion">時尚</div>
</div>

<main class="grid" id="articles-grid">
  <div class="loading-state">
    <div class="loading-title">正在整理今日日報…</div>
    <div class="spinner-line"></div>
    <div style="font-size:11px; color:var(--ink-faint); letter-spacing:0.08em;">FETCHING LATEST FROM DEZEEN · IT'S NICE THAT</div>
  </div>
</main>

<footer>
  <div class="f-left">設計日報 &nbsp;·&nbsp; Powered by Claude</div>
  <div class="f-right">每日自動更新 &nbsp;·&nbsp; DEZEEN &amp; IT'S NICE THAT</div>
</footer>

<script>
  // Set display date
  const now = new Date();
  document.getElementById('display-date').textContent = now.toLocaleDateString('zh-TW', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'long'
  });

  // Try to load today's brief from brief.json (generated by GitHub Actions)
  async function loadBrief() {
    try {
      const res = await fetch('brief.json?t=' + Date.now());
      if (!res.ok) throw new Error('not found');
      const data = await res.json();
      renderBrief(data);
    } catch (e) {
      // Show empty state if no brief yet
      document.getElementById('articles-grid').innerHTML = `
        <div class="empty-notice">
          今日日報尚未生成<br>
          <small style="font-family: 'IBM Plex Mono', monospace; font-size:11px; font-style:normal; letter-spacing:0.06em; color:var(--ink-faint);">
            GitHub Actions 將於每日 09:00 (UTC+8) 自動更新
          </small>
        </div>`;
    }
  }

  function catClass(cat) {
    return cat === '時尚' ? 'fashion' : 'design';
  }

  function renderArticle(a, colClass, noBorderRight) {
    const cls = catClass(a.category);
    return `
      <article class="article ${colClass}${noBorderRight ? ' no-border-right' : ''}">
        <span class="cat-tag ${cls}">${a.category}</span>
        <div class="article-source">${a.source}</div>
        <h2 class="article-title">${a.title}</h2>
        <div class="field-label">核心摘要</div>
        <div class="field-body">${a.summary}</div>
        <div class="field-label">${a.category === '時尚' ? '品牌定位 / 美學方向' : '設計語言 / 工法'}</div>
        <div class="field-body">${a.details}</div>
        <div class="field-label">趨勢脈絡</div>
        <div class="field-body">${a.context}</div>
        <div class="pov-body">${a.pov}</div>
        <div class="tags-row">${a.tags.map(t => `<span class="kw">${t}</span>`).join('')}</div>
        ${a.url ? `<a class="article-link" href="${a.url}" target="_blank">閱讀原文 →</a>` : ''}
      </article>`;
  }

  function renderBrief(data) {
    const articles = data.articles || [];
    if (!articles.length) return;

    let html = '';
    articles.forEach((a, i) => {
      if (i === 0) html += renderArticle(a, 'col-8', false);
      else if (i === 1) html += renderArticle(a, 'col-4', true);
      else html += renderArticle(a, 'col-6', i % 2 === 1);
    });

    document.getElementById('articles-grid').innerHTML = html;

    if (data.generated_at) {
      document.getElementById('last-updated').textContent =
        '更新於 ' + new Date(data.generated_at).toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
    }
  }

  loadBrief();
</script>

</body>
</html>
