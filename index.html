<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>設計日報</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --bg-secondary: #f5f5f7;
      --bg-tertiary: #e8e8ed;
      --text: #1d1d1f;
      --text-secondary: #6e6e73;
      --text-tertiary: #aeaeb2;
      --border: #d2d2d7;
      --border-light: #e8e8ed;
      --blue: #0071e3;
      --blue-hover: #0077ed;
      --design-bg: #f0f4ff;
      --design-dot: #0057b8;
      --fashion-bg: #fff0f5;
      --fashion-dot: #b8004a;
      --radius: 18px;
      --radius-sm: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, 'SF Pro Display', 'Noto Sans TC', sans-serif;
      font-size: 17px;
      line-height: 1.47059;
      -webkit-font-smoothing: antialiased;
    }

    /* NAV */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(255,255,255,0.85);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 0.5px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 52px;
    }

    .nav-logo {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.022em;
    }

    .nav-meta {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-date {
      font-size: 12px;
      color: var(--text-secondary);
      letter-spacing: -0.01em;
    }

    .nav-updated {
      font-size: 12px;
      color: var(--text-tertiary);
    }

    /* HEADER */
    .page-header {
      padding: 3rem 2rem 2rem;
      border-bottom: 0.5px solid var(--border-light);
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
    }

    .page-header-left h1 {
      font-size: clamp(2.2rem, 5vw, 3.5rem);
      font-weight: 600;
      letter-spacing: -0.025em;
      line-height: 1.05;
      color: var(--text);
    }

    .page-header-left p {
      font-size: 14px;
      color: var(--text-secondary);
      margin-top: 0.5rem;
      letter-spacing: -0.01em;
    }

    .count-badge {
      font-size: 13px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    /* SECTION TABS */
    .section-tabs {
      display: flex;
      gap: 0;
      padding: 0 2rem;
      border-bottom: 0.5px solid var(--border-light);
      overflow-x: auto;
      scrollbar-width: none;
    }
    .section-tabs::-webkit-scrollbar { display: none; }

    .section-tab {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      padding: 0.85rem 1.2rem;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      cursor: default;
      letter-spacing: -0.01em;
      transition: color 0.2s;
    }

    .section-tab.design.active {
      color: var(--design-dot);
      border-color: var(--design-dot);
    }

    .section-tab.fashion.active {
      color: var(--fashion-dot);
      border-color: var(--fashion-dot);
    }

    /* SECTION */
    .section { padding: 2rem 0 1rem; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      padding: 0 2rem;
      margin-bottom: 1.25rem;
    }

    /* CARDS SCROLL */
    .cards-scroll {
      display: flex;
      gap: 1rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
      scroll-snap-type: x mandatory;
      padding: 0 2rem 1.5rem;
    }
    .cards-scroll::-webkit-scrollbar { display: none; }

    /* CARD */
    .card {
      flex-shrink: 0;
      width: 300px;
      background: var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius);
      scroll-snap-align: start;
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
                  box-shadow 0.35s ease;
      cursor: default;
    }

    .card:hover {
      transform: scale(1.025) translateY(-3px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    }

    /* CARD IMAGE */
    .card-img {
      width: 100%;
      height: 180px;
      overflow: hidden;
      position: relative;
      background: var(--bg-secondary);
    }

    .card-img.design-bg { background: var(--design-bg); }
    .card-img.fashion-bg { background: var(--fashion-bg); }

    .card-img-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card-img-placeholder svg {
      width: 48px;
      height: 48px;
      opacity: 0.15;
    }

    .card-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.4s ease, transform 0.4s ease;
      position: absolute;
      inset: 0;
    }

    .card-img img.loaded { opacity: 1; }
    .card:hover .card-img img { transform: scale(1.04); }

    /* CAT DOT */
    .cat-pill {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(8px);
    }

    .cat-pill.design { color: var(--design-dot); }
    .cat-pill.fashion { color: var(--fashion-dot); }

    /* CARD BODY */
    .card-body { padding: 1.1rem 1.2rem 1.2rem; }

    .card-source {
      font-size: 11px;
      color: var(--text-tertiary);
      letter-spacing: -0.01em;
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.018em;
      line-height: 1.3;
      color: var(--text);
      margin-bottom: 0.6rem;
    }

    .card-summary {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      letter-spacing: -0.01em;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 0.9rem;
    }

    /* EXPAND */
    .expand-btn {
      background: none;
      border: none;
      padding: 0;
      font-size: 12px;
      font-weight: 500;
      color: var(--blue);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      letter-spacing: -0.01em;
      font-family: inherit;
      margin-bottom: 0.75rem;
    }

    .expand-btn:hover { color: var(--blue-hover); }

    .expand-icon {
      font-size: 10px;
      transition: transform 0.25s ease;
      display: inline-block;
    }

    .expand-btn.open .expand-icon { transform: rotate(180deg); }

    .card-details {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.45s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .card-details.open {
      max-height: 500px;
    }

    .detail-inner {
      border-top: 0.5px solid var(--border-light);
      padding-top: 0.85rem;
      margin-bottom: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
    }

    .detail-field {}

    .detail-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-tertiary);
      margin-bottom: 4px;
    }

    .detail-body {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.6;
      letter-spacing: -0.01em;
    }

    .pov-body {
      font-size: 12px;
      color: var(--text);
      line-height: 1.6;
      letter-spacing: -0.01em;
      font-style: italic;
      padding-left: 0.75rem;
      border-left: 2px solid var(--blue);
    }

    /* CARD FOOTER */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 0.5px solid var(--border-light);
      padding-top: 0.75rem;
      margin-top: 0.1rem;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .card-tag {
      font-size: 10px;
      color: var(--text-tertiary);
      background: var(--bg-secondary);
      border-radius: var(--radius-sm);
      padding: 2px 7px;
      letter-spacing: -0.01em;
    }

    .card-link {
      font-size: 11px;
      font-weight: 500;
      color: var(--blue);
      text-decoration: none;
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: -0.01em;
    }

    .card-link:hover { color: var(--blue-hover); text-decoration: underline; }

    /* DIVIDER */
    .section-divider {
      height: 0.5px;
      background: var(--border-light);
      margin: 0 2rem;
    }

    /* LOADING */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem 2rem;
      gap: 1.5rem;
    }

    .loading p {
      font-size: 14px;
      color: var(--text-tertiary);
      letter-spacing: -0.01em;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY */
    .empty {
      padding: 4rem 2rem;
      text-align: center;
    }

    .empty h3 {
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.022em;
      color: var(--text);
      margin-bottom: 0.5rem;
    }

    .empty p {
      font-size: 14px;
      color: var(--text-secondary);
      letter-spacing: -0.01em;
    }

    /* FOOTER */
    footer {
      border-top: 0.5px solid var(--border-light);
      padding: 1.5rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-logo {
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: -0.01em;
    }

    .footer-credit {
      font-size: 12px;
      color: var(--text-tertiary);
      letter-spacing: -0.01em;
    }

    /* ANIMATIONS */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .section { animation: fadeIn 0.5s ease forwards; }

    @media (max-width: 600px) {
      nav { padding: 0 1.25rem; }
      .page-header { padding: 2rem 1.25rem 1.5rem; flex-direction: column; align-items: flex-start; gap: 1rem; }
      .section-tabs { padding: 0 1.25rem; }
      .section-label { padding: 0 1.25rem; }
      .cards-scroll { padding: 0 1.25rem 1.5rem; }
      .card { width: 260px; }
      footer { padding: 1.25rem; flex-direction: column; gap: 0.5rem; text-align: center; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="#">設計日報</a>
  <div class="nav-meta">
    <span class="nav-date" id="nav-date"></span>
    <span class="nav-updated" id="nav-updated"></span>
  </div>
</nav>

<div class="page-header">
  <div class="page-header-left">
    <h1>今日精選</h1>
    <p>設計與時尚每日動態，由 Claude AI 整理</p>
  </div>
  <div class="count-badge" id="count-badge">載入中</div>
</div>

<div class="section-tabs">
  <div class="section-tab design active">設計</div>
  <div class="section-tab fashion active">時尚</div>
</div>

<main id="main-content">
  <div class="loading">
    <div class="spinner"></div>
    <p>正在載入今日日報</p>
  </div>
</main>

<footer>
  <div class="footer-logo">設計日報 · Design Brief</div>
  <div class="footer-credit">Powered by Claude · 每日 09:00 自動更新</div>
</footer>

<script>
  // Date
  document.getElementById('nav-date').textContent = new Date().toLocaleDateString('zh-TW', {
    year: 'numeric', month: 'long', day: 'numeric', weekday: 'short'
  });

  function catClass(cat) { return cat === '時尚' ? 'fashion' : 'design'; }

  function designIcon() {
    return `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="8" y="8" width="32" height="32" rx="4" stroke="currentColor" stroke-width="2"/>
      <line x1="8" y1="20" x2="40" y2="20" stroke="currentColor" stroke-width="2"/>
      <line x1="20" y1="20" x2="20" y2="40" stroke="currentColor" stroke-width="2"/>
    </svg>`;
  }

  function fashionIcon() {
    return `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M16 8 L24 16 L32 8 L40 14 L36 28 L12 28 L8 14 Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
      <path d="M12 28 L10 40 L38 40 L36 28" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
    </svg>`;
  }

  function renderCard(a) {
    const cls = catClass(a.category);
    const icon = cls === 'design' ? designIcon() : fashionIcon();
    const imgTag = a.image_url
      ? `<img data-src="${a.image_url}" alt="${a.title}">`
      : '';

    return `
      <div class="card">
        <div class="card-img ${cls}-bg">
          <div class="card-img-placeholder" style="color: var(--${cls}-dot)">${icon}</div>
          ${imgTag}
          <span class="cat-pill ${cls}">${a.category}</span>
        </div>
        <div class="card-body">
          <div class="card-source">${a.source}</div>
          <h2 class="card-title">${a.title}</h2>
          <p class="card-summary">${a.summary}</p>
          <button class="expand-btn" onclick="toggleExpand(this)">
            深度分析 <span class="expand-icon">⌄</span>
          </button>
          <div class="card-details">
            <div class="detail-inner">
              <div class="detail-field">
                <div class="detail-label">${a.category === '時尚' ? '品牌定位' : '設計語言'}</div>
                <div class="detail-body">${a.details}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">趨勢脈絡</div>
                <div class="detail-body">${a.context}</div>
              </div>
              <div class="detail-field">
                <div class="detail-label">觀點</div>
                <div class="pov-body">${a.pov}</div>
              </div>
            </div>
          </div>
          <div class="card-footer">
            <div class="card-tags">${(a.tags||[]).slice(0,2).map(t=>`<span class="card-tag">${t}</span>`).join('')}</div>
            ${a.url ? `<a class="card-link" href="${a.url}" target="_blank">原文 →</a>` : ''}
          </div>
        </div>
      </div>`;
  }

  function toggleExpand(btn) {
    const details = btn.nextElementSibling;
    const isOpen = details.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
    btn.childNodes[0].textContent = isOpen ? '收起 ' : '深度分析 ';
  }

  function renderSection(label, articles) {
    return `
      <div class="section">
        <div class="section-label">${label}</div>
        <div class="cards-scroll">${articles.map(renderCard).join('')}</div>
      </div>`;
  }

  async function loadBrief() {
    try {
      const res = await fetch('brief.json?t=' + Date.now());
      if (!res.ok) throw new Error('not found');
      const data = await res.json();
      const articles = data.articles || [];
      if (!articles.length) throw new Error('empty');

      const design = articles.filter(a => a.category !== '時尚');
      const fashion = articles.filter(a => a.category === '時尚');

      let html = '';
      if (design.length) html += renderSection('設計 · Design', design);
      if (design.length && fashion.length) html += '<div class="section-divider"></div>';
      if (fashion.length) html += renderSection('時尚 · Fashion', fashion);

      document.getElementById('main-content').innerHTML = html;
      document.getElementById('count-badge').textContent = `${articles.length} 篇文章`;

      // Load images
      document.querySelectorAll('img[data-src]').forEach(img => {
        img.src = img.dataset.src;
        img.onload = () => img.classList.add('loaded');
        img.onerror = () => img.remove();
      });

      if (data.generated_at) {
        const d = new Date(data.generated_at);
        document.getElementById('nav-updated').textContent =
          '更新 ' + d.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
      }

    } catch(e) {
      document.getElementById('main-content').innerHTML = `
        <div class="empty">
          <h3>今日日報尚未生成</h3>
          <p>每日 09:00 自動更新</p>
        </div>`;
      document.getElementById('count-badge').textContent = '—';
    }
  }

  loadBrief();
</script>
</body>
</html>
